<main class="content">
	<h1 class="page-title-lg">Projects</h1>
	<ul class="card-list">
		{% for project in projects %}
		<li>
			<a href="{{ project.url }}" class="link font-medium">{{ project.name }}</a>
			<p class="muted text-sm mt-1">{{ project.description }}</p>
		</li>
		{% endfor %}
	</ul>
</main>
